<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="韓国語単語帳">
<title>🇰🇷 韓国語単語帳プレイヤー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #6C63FF;
    --accent2: #ff6584;
    --text: #f0f0f5;
    --text2: #8888a0;
    --text3: #55556a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  /* background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 2rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    padding: 56px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header-flag { font-size: 24px; }

  /* Drop zone */
  #dropZone {
    margin: 0 20px 20px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  #dropZone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(108,99,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  #dropZone.over, #dropZone:active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.1);
  }
  #dropZone input { display: none; }
  .drop-emoji { font-size: 48px; margin-bottom: 12px; }
  .drop-main { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .drop-badge {
    display: inline-block;
    margin-top: 14px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 100px;
  }

  /* Main player card */
  #playerCard {
    display: none;
    flex-direction: column;
    gap: 0;
    margin: 0 16px;
  }

  .artwork-area {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 28px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .disc {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #6C63FF, #ff6584, #ffb347, #6C63FF);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: transform 0.3s;
    box-shadow: 0 8px 32px rgba(108,99,255,0.3);
  }
  .disc.spinning {
    animation: spin 4s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .disc-center {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .track-info { text-align: center; width: 100%; }
  .track-title {
    font-size: 17px; font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .track-sub { font-size: 13px; color: var(--text2); }

  .controls-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border2);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Progress */
  .progress-wrap { display: flex; flex-direction: column; gap: 6px; }
  .seek {
    width: 100%; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3);
    font-variant-numeric: tabular-nums;
  }

  /* Play controls */
  .btn-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
  }
  .btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.15s;
    color: var(--text);
  }
  .btn:active { transform: scale(0.92); }
  .btn-prev, .btn-next {
    width: 44px; height: 44px;
    background: var(--surface2);
    font-size: 20px;
  }
  .btn-play {
    width: 64px; height: 64px;
    background: var(--accent);
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(108,99,255,0.45);
  }
  .btn-play:active { box-shadow: 0 2px 10px rgba(108,99,255,0.3); }

  /* Bottom controls */
  .bottom-controls {
    display: flex; align-items: center; gap: 10px;
  }
  .speed-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px; font-weight: 600;
    padding: 6px 10px; cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: -apple-system, sans-serif;
  }
  .speed-btn:active { background: var(--accent); border-color: var(--accent); }

  .vol-wrap {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
  }
  .vol-icon { font-size: 14px; color: var(--text2); }
  .vol {
    flex: 1; height: 3px;
    -webkit-appearance: none; appearance: none;
    background: var(--surface2);
    border-radius: 2px; cursor: pointer;
  }
  .vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text2); cursor: pointer;
  }

  .repeat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 12px; font-weight: 600;
    padding: 6px 10px; cursor: pointer;
    transition: all 0.15s;
    font-family: -apple-system, sans-serif;
  }
  .repeat-btn.on {
    background: rgba(108,99,255,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Track list */
  #listCard {
    display: none;
    margin: 12px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .list-header {
    padding: 12px 18px;
    font-size: 12px; font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .list-count {
    background: var(--surface2);
    border-radius: 100px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text3);
  }
  .track-list { max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .track-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 18px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    -webkit-user-select: none;
  }
  .track-item:last-child { border-bottom: none; }
  .track-item:active { background: var(--surface2); }
  .track-item.active { background: rgba(108,99,255,0.12); }
  .t-num { font-size: 11px; color: var(--text3); min-width: 22px; font-variant-numeric: tabular-nums; }
  .t-name {
    flex: 1; font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-item.active .t-name { color: var(--accent); font-weight: 600; }
  .track-item.active .t-num { color: var(--accent); }
  .now-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* SVG icons inline */
  .icon-play { display: inline-block; width: 1em; height: 1em; vertical-align: middle; }

  /* Speed popup */
  .speed-popup {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    padding: 20px 24px 40px;
    z-index: 100;
    animation: slideUp 0.25s ease;
  }
  .speed-popup.open { display: block; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .speed-popup-title {
    font-size: 14px; font-weight: 600; color: var(--text2);
    margin-bottom: 16px; text-align: center;
  }
  .speed-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .speed-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 15px; font-weight: 600;
    padding: 14px;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
    font-family: -apple-system, sans-serif;
  }
  .speed-opt.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .speed-overlay {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,0.5);
  }
  .speed-overlay.open { display: block; }

  /* Loading state */
  .loading-msg {
    margin: 0 20px;
    padding: 20px;
    text-align: center;
    color: var(--text2);
    font-size: 14px;
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">韓国語単語帳</div>
    <div class="header-flag">🇰🇷</div>
  </div>

  <!-- Drop zone -->
  <div id="dropZone">
    <input type="file" id="fileInput" accept=".zip">
    <div class="drop-emoji">📦</div>
    <div class="drop-main">ZIPファイルを選択</div>
    <div class="drop-sub">タップしてファイルを選ぶ<br>001.mp3, 002.mp3... 形式に対応</div>
    <div class="drop-badge">ファイルを選択 →</div>
  </div>

  <!-- Loading -->
  <div class="loading-msg" id="loadingMsg">
    <span class="spinner"></span>読み込み中...
  </div>

  <!-- Player -->
  <div id="playerCard">
    <div class="artwork-area">
      <div class="disc" id="disc">
        <div class="disc-center">🎵</div>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitle">—</div>
        <div class="track-sub" id="trackSub">—</div>
      </div>
    </div>

    <div class="controls-area">
      <div class="progress-wrap">
        <input type="range" class="seek" id="seekBar" min="0" max="100" step="0.1" value="0">
        <div class="time-row">
          <span id="tNow">0:00</span>
          <span id="tTotal">0:00</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-prev" id="btnPrev" aria-label="前の曲">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="btn btn-play" id="btnPlay" aria-label="再生">
          <svg id="playIcon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn btn-next" id="btnNext" aria-label="次の曲">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>

      <div class="bottom-controls">
        <button class="speed-btn" id="speedBtn">1.0x</button>
        <div class="vol-wrap">
          <span class="vol-icon">🔈</span>
          <input type="range" class="vol" id="volBar" min="0" max="1" step="0.05" value="1">
          <span class="vol-icon">🔊</span>
        </div>
        <button class="repeat-btn" id="repeatBtn">リピート</button>
      </div>
    </div>
  </div>

  <!-- Track list -->
  <div id="listCard">
    <div class="list-header">
      <span>トラック一覧</span>
      <span class="list-count" id="listCount">0件</span>
    </div>
    <div class="track-list" id="trackList"></div>
  </div>
</div>

<!-- Speed popup -->
<div class="speed-overlay" id="speedOverlay"></div>
<div class="speed-popup" id="speedPopup">
  <div class="speed-popup-title">再生速度</div>
  <div class="speed-options">
    <button class="speed-opt" data-val="0.5">0.5x</button>
    <button class="speed-opt" data-val="0.75">0.75x</button>
    <button class="speed-opt selected" data-val="1">1.0x</button>
    <button class="speed-opt" data-val="1.25">1.25x</button>
    <button class="speed-opt" data-val="1.5">1.5x</button>
    <button class="speed-opt" data-val="2">2.0x</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const playerCard = document.getElementById('playerCard');
const listCard = document.getElementById('listCard');
const loadingMsg = document.getElementById('loadingMsg');
const disc = document.getElementById('disc');
const trackTitle = document.getElementById('trackTitle');
const trackSub = document.getElementById('trackSub');
const seekBar = document.getElementById('seekBar');
const tNow = document.getElementById('tNow');
const tTotal = document.getElementById('tTotal');
const btnPlay = document.getElementById('btnPlay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const playIcon = document.getElementById('playIcon');
const volBar = document.getElementById('volBar');
const repeatBtn = document.getElementById('repeatBtn');
const speedBtn = document.getElementById('speedBtn');
const speedOverlay = document.getElementById('speedOverlay');
const speedPopup = document.getElementById('speedPopup');
const trackList = document.getElementById('trackList');
const listCount = document.getElementById('listCount');

let tracks = [];
let urls = [];
let currentIndex = 0;
let playing = false;
let repeat = false;
let speed = 1.0;

const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
const PAUSE_SVG = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

function fmt(t) {
  if (!isFinite(t) || isNaN(t)) return '0:00';
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

// File input
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadZip(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadZip(e.target.files[0]); });

async function loadZip(file) {
  dropZone.style.display = 'none';
  loadingMsg.style.display = 'block';

  try {
    const zip = await JSZip.loadAsync(file);
    const mp3Files = [];
    zip.forEach((path, entry) => {
      const name = path.replace(/.*\//, '');
      if (!entry.dir && name.match(/\.mp3$/i) && !path.includes('__MACOSX')) {
        mp3Files.push({ name, entry });
      }
    });
    mp3Files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    urls.forEach(u => URL.revokeObjectURL(u));
    urls = [];
    tracks = [];

    for (const f of mp3Files) {
      const blob = await f.entry.async('blob');
      const url = URL.createObjectURL(new Blob([blob], { type: 'audio/mpeg' }));
      urls.push(url);
      tracks.push({ name: f.name, url });
    }

    loadingMsg.style.display = 'none';

    if (tracks.length === 0) {
      dropZone.style.display = 'block';
      dropZone.querySelector('.drop-main').textContent = 'MP3が見つかりませんでした';
      return;
    }

    playerCard.style.display = 'flex';
    listCard.style.display = 'block';
    listCount.textContent = tracks.length + '件';
    renderList();
    loadTrack(0);
  } catch (err) {
    loadingMsg.style.display = 'none';
    dropZone.style.display = 'block';
    dropZone.querySelector('.drop-main').textContent = 'エラーが発生しました';
    dropZone.querySelector('.drop-sub').textContent = '別のZIPファイルをお試しください';
  }
}

function renderList() {
  trackList.innerHTML = '';
  tracks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item' + (i === currentIndex ? ' active' : '');
    const dot = (i === currentIndex && playing) ? '<span class="now-dot"></span>' : '';
    item.innerHTML = `<span class="t-num">${i + 1}</span><span class="t-name">${t.name.replace(/\.mp3$/i, '')}</span>${dot}`;
    item.addEventListener('click', () => {
      loadTrack(i);
      playAudio();
    });
    trackList.appendChild(item);
  });
  // scroll active into view
  const active = trackList.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function loadTrack(i) {
  currentIndex = i;
  const t = tracks[i];
  audio.src = t.url;
  audio.playbackRate = speed;
  audio.volume = parseFloat(volBar.value);
  const cleanName = t.name.replace(/\.mp3$/i, '');
  trackTitle.textContent = cleanName;
  trackSub.textContent = `${i + 1} / ${tracks.length}`;
  seekBar.value = 0;
  tNow.textContent = '0:00';
  tTotal.textContent = '0:00';
  renderList();
  updateMediaSession(cleanName);
}

function playAudio() {
  audio.play().catch(() => {});
  playing = true;
  playIcon.innerHTML = PAUSE_SVG;
  disc.classList.add('spinning');
  renderList();
}

function pauseAudio() {
  audio.pause();
  playing = false;
  playIcon.innerHTML = PLAY_SVG;
  disc.classList.remove('spinning');
  renderList();
}

btnPlay.addEventListener('click', () => { playing ? pauseAudio() : playAudio(); });

btnPrev.addEventListener('click', () => {
  const i = currentIndex > 0 ? currentIndex - 1 : tracks.length - 1;
  loadTrack(i);
  if (playing) playAudio();
});

btnNext.addEventListener('click', () => {
  const i = (currentIndex + 1) % tracks.length;
  loadTrack(i);
  if (playing) playAudio();
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  seekBar.value = (audio.currentTime / audio.duration) * 100;
  tNow.textContent = fmt(audio.currentTime);
  tTotal.textContent = fmt(audio.duration);
});

seekBar.addEventListener('input', () => {
  if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
});

audio.addEventListener('ended', () => {
  if (repeat) { audio.currentTime = 0; playAudio(); return; }
  if (currentIndex < tracks.length - 1) {
    loadTrack(currentIndex + 1);
    playAudio();
  } else {
    playing = false;
    playIcon.innerHTML = PLAY_SVG;
    disc.classList.remove('spinning');
    renderList();
  }
});

volBar.addEventListener('input', () => { audio.volume = parseFloat(volBar.value); });

repeatBtn.addEventListener('click', () => {
  repeat = !repeat;
  repeatBtn.classList.toggle('on', repeat);
  repeatBtn.textContent = repeat ? 'リピートON' : 'リピート';
});

// Speed popup
speedBtn.addEventListener('click', () => {
  speedPopup.classList.add('open');
  speedOverlay.classList.add('open');
});
speedOverlay.addEventListener('click', () => {
  speedPopup.classList.remove('open');
  speedOverlay.classList.remove('open');
});
document.querySelectorAll('.speed-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = parseFloat(btn.dataset.val);
    audio.playbackRate = speed;
    speedBtn.textContent = speed === 1 ? '1.0x' : speed + 'x';
    document.querySelectorAll('.speed-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    speedPopup.classList.remove('open');
    speedOverlay.classList.remove('open');
  });
});

// Media Session (ロック画面・コントロールセンター)
function updateMediaSession(name) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: name,
    artist: '韓国語単語帳',
    album: 'MP3プレイヤー'
  });
  navigator.mediaSession.setActionHandler('play', playAudio);
  navigator.mediaSession.setActionHandler('pause', pauseAudio);
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    const i = currentIndex > 0 ? currentIndex - 1 : tracks.length - 1;
    loadTrack(i); if (playing) playAudio();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    const i = (currentIndex + 1) % tracks.length;
    loadTrack(i); if (playing) playAudio();
  });
}
</script>
</body>
